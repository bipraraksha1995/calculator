name: DevSecOps Java Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  devsecops:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # 2. Setup Java
    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17
        cache: maven

    # 3. Build (Maven will still work even if files are in root)
    - name: Build Application
      run: mvn clean install -DskipTests

    # 4. SonarCloud Scan (FIXED)
    - name: SonarCloud Scan
      uses: SonarSource/sonarqube-scan-action@v5
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        args: >
          -Dsonar.projectKey=bipraraksha1995_calculator
          -Dsonar.organization=bipraraksha1995
          -Dsonar.sources=.
          -Dsonar.java.binaries=target
          -Dsonar.exclusions=target/**

    # 5. Setup Snyk
    - name: Setup Snyk
      uses: snyk/actions/setup@master

    # 6. Snyk Scan (WORKS because pom.xml exists)
    - name: Snyk Dependency Scan
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      run: snyk test --all-projects

    # 7. Trivy Scan
    - name: Trivy Scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: fs
        scan-ref: .
        format: table
        exit-code: 1
        severity: CRITICAL,HIGH

    # 8. Run App (since no target/classes guaranteed)
    - name: Compile & Run Manually
      run: |
        mkdir -p bin
        javac -d bin Main.java model/*.java service/*.java utils/*.java
        echo "5" | java -cp bin Main
