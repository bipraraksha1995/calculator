name: DevSecOps Java Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  devsecops:
    name: Build, Scan & Test
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout Code
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # 2. Setup Java
    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17
        cache: maven

    # 3. Build with Maven
    - name: Build Application
      run: mvn clean install -DskipTests

    # 4. SonarCloud Scan (SAST)
    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        args: >
          -Dsonar.projectKey=bipraraksha1995_calculator
          -Dsonar.organization=bipraraksha1995
          -Dsonar.sources=src
          -Dsonar.java.binaries=target
          -Dsonar.exclusions=target/**

    # 5. Setup Snyk
    - name: Setup Snyk
      uses: snyk/actions/setup@master

    # 6. Snyk Dependency Scan (SCA)
    - name: Snyk Open Source Scan
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      run: snyk test --all-projects

    # 7. Trivy Filesystem Scan
    - name: Trivy Scan (FS)
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: fs
        scan-ref: .
        format: table
        exit-code: 1
        severity: CRITICAL,HIGH

    # 8. Run Application Test
    - name: Run Application
      run: |
        echo "5" | java -cp target/classes Main
