name: DevSecOps Java Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  devsecops:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # 2. Setup Java
    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17
        cache: maven

    # 3. Build (for Snyk dependency resolution)
    - name: Build with Maven
      run: mvn clean install -DskipTests

    # 4. SonarCloud Scan (Updated Action + Fixed Path)
    - name: SonarCloud Scan
      uses: SonarSource/sonarqube-scan-action@v5
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        args: >
          -Dsonar.projectKey=bipraraksha1995_calculator
          -Dsonar.organization=bipraraksha1995
          -Dsonar.sources=.
          -Dsonar.java.binaries=target
          -Dsonar.exclusions=target/**

    # 5. Setup Snyk
    - name: Setup Snyk
      uses: snyk/actions/setup@master

    # 6. Authenticate Snyk (IMPORTANT FIX)
    - name: Authenticate Snyk
      run: snyk auth ${{ secrets.SNYK_TOKEN }}

    # 7. Snyk Test (SCA - shows vulnerabilities but doesn't break demo)
    - name: Snyk Test
      run: snyk test --severity-threshold=high || true

    # 8. Snyk Monitor (Push results to dashboard)
    - name: Snyk Monitor
      run: snyk monitor --all-projects || true

    # 9. Trivy Scan (Fail on real issues)
    - name: Trivy Filesystem Scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: fs
        scan-ref: .
        format: table
        exit-code: 1
        severity: CRITICAL,HIGH

    # 10. Compile & Run (since project not standard Maven layout)
    - name: Compile & Run Application
      run: |
        mkdir -p bin
        javac -d bin Main.java model/*.java service/*.java utils/*.java
        echo "5" | java -cp bin Main
