name: DevSecOps Multi-Stage Pipeline

permissions:
  contents: read
  issues: write   # Fix for ZAP GitHub issue error

on:
  push:
    branches: ["main", "qa-*", "dev"]
  pull_request:
    branches: ["main"]

jobs:

# =========================
# 🔹 DEV STAGE
# =========================
  dev:
    name: Dev Stage (Build + SAST + SCA)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup JDK
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17
        cache: maven

    - name: Build
      run: mvn clean install -DskipTests

    # SAST - Sonar
    - name: Sonar Scan
      uses: SonarSource/sonarqube-scan-action@v5
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        args: >
          -Dsonar.projectKey=bipraraksha1995_calculator
          -Dsonar.organization=bipraraksha1995
          -Dsonar.sources=.
          -Dsonar.java.binaries=target
          -Dsonar.exclusions=target/**

    # SCA - Snyk
    - name: Setup Snyk
      uses: snyk/actions/setup@master

    - name: Snyk Test
      run: snyk test --severity-threshold=high || true

# =========================
# 🔹 QA STAGE
# =========================
  qa:
    name: QA Stage (DAST + Security Validation)
    runs-on: ubuntu-latest
    needs: dev
    if: startsWith(github.ref, 'refs/heads/qa-')

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # Start a stable test server (instead of Java CLI app)
    - name: Start Test Server
      run: |
        python3 -m http.server 8080 &
        sleep 15

    # Verify server is reachable (VERY IMPORTANT)
    - name: Verify Server
      run: curl --retry 5 --retry-delay 5 http://127.0.0.1:8080

    # OWASP ZAP Scan (FIXED VERSION)
    - name: OWASP ZAP Scan
      uses: zaproxy/action-baseline@v0.10.0
      with:
        target: 'http://127.0.0.1:8080'
        fail_action: false
    #allow_issue_writing: false

    # Upload ZAP Report (optional but recommended)
    - name: Upload ZAP Report
      uses: actions/upload-artifact@v4
      with:
        name: zap-report
        path: |
          report*.html
          report*.json
          report*.md
      continue-on-error: true

    - name: Create Pull Request to Main
      if: success()
      run: |
        if gh pr list --head ${GITHUB_REF_NAME} --base main | grep -q .; then
        echo "PR already exists"
        else
          gh pr create \
            --base main \
            --head ${GITHUB_REF_NAME} \
            --title "Auto PR: ${GITHUB_REF_NAME} → main" \
            --body "Automated PR after QA success"
        fi
      env: 
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# =========================
# 🔹 PROD STAGE
# =========================
  prod:
    name: Prod Stage (Release + Infra Scan)
    runs-on: ubuntu-latest
    needs: dev
    if: github.ref == 'refs/heads/main'

    environment:
      name: production

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Build Final Artifact
      run: mvn clean package

    # Trivy Scan (Final Gate)
    - name: Trivy Scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: fs
        scan-ref: .
        severity: CRITICAL,HIGH
        exit-code: 1

    # Optional: Nessus Trigger
    - name: Nessus Scan (Infra)
      run: |
        curl -X POST "https://nessus-server:8834/scans" \
        -H "X-ApiKeys: accessKey=${{ secrets.NESSUS_ACCESS }}; secretKey=${{ secrets.NESSUS_SECRET }}" \
        -H "Content-Type: application/json" \
        -d '{"uuid":"scan-template-id","settings":{"name":"Prod Scan","text_targets":"your-server-ip"}}'
