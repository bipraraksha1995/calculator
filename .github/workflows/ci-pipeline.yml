name: DevSecOps Multi-Stage Pipeline

on:
  push:
    branches: ["main", "qa-*", "dev"]
  pull_request:
    branches: ["main"]

jobs:

# =========================
# 🔹 DEV STAGE
# =========================
  dev:
    name: Dev Stage (Build + SAST + SCA)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup JDK
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17
        cache: maven

    - name: Build
      run: mvn clean install -DskipTests

    # SAST - Sonar
    - name: Sonar Scan
      uses: SonarSource/sonarqube-scan-action@v5
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
         args: >
          -Dsonar.projectKey=bipraraksha1995_calculator
          -Dsonar.organization=bipraraksha1995
          -Dsonar.sources=.
          -Dsonar.java.binaries=target
          -Dsonar.exclusions=target/**

    # SCA - Snyk
    - name: Setup Snyk
      uses: snyk/actions/setup@master

    - name: Snyk Test
      run: snyk test --severity-threshold=high || true

# =========================
# 🔹 QA STAGE
# =========================
  qa:
    name: QA Stage (DAST + Security Validation)
    runs-on: ubuntu-latest
    needs: dev
    if: startsWith(github.ref, 'refs/heads/qa-')

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Build & Run App
      run: |
        mkdir -p bin
        javac -d bin Main.java model/*.java service/*.java utils/*.java
        nohup java -cp bin Main > app.log 2>&1 &
        sleep 20
    - name: Start Dummy Server
      run: |
        python3 -m http.server 8080 &
        sleep 10
    - name: Check App Availability
      run: |
        curl -v http://localhost:8080 || true
        cat app.log || true

    # DAST - OWASP ZAP
    - name: OWASP ZAP Scan
      uses: zaproxy/action-baseline@v0.10.0
      with:
        target: 'http://127.0.0.1:8080'
        fail_action: false
        cmd_options: '-dir /tmp -r report.html -J report.json -w report.md'

# =========================
# 🔹 PROD STAGE
# =========================
  prod:
    name: Prod Stage (Release + Infra Scan)
    runs-on: ubuntu-latest
    needs: qa
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Build Final Artifact
      run: mvn clean package

    # Trivy Scan (Final Gate)
    - name: Trivy Scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: fs
        scan-ref: .
        severity: CRITICAL,HIGH
        exit-code: 1

    # Optional: Nessus Trigger
    - name: Nessus Scan (Infra)
      run: |
        curl -X POST "https://nessus-server:8834/scans" \
        -H "X-ApiKeys: accessKey=${{ secrets.NESSUS_ACCESS }}; secretKey=${{ secrets.NESSUS_SECRET }}" \
        -H "Content-Type: application/json" \
        -d '{"uuid":"scan-template-id","settings":{"name":"Prod Scan","text_targets":"your-server-ip"}}'
